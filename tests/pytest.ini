[pytest]
testpaths = tests
pythonpath = voxstudio
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --timeout=30
    --strict-markers
asyncio_mode = auto
markers =
    slow: tests lents (generation audio, LLM)
    integration: tests necessitant des services externes
    asyncio: tests asynchrones
